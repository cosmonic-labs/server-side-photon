name: Build and publish server-side-photon components

on:
  push:
    branches: [main, add-publish-workflow]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (defaults to a sha-based tag)."
        required: false
        type: string

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build-and-publish:
    name: Build and push http-api + task-photon
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (wasm32-wasip2)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Setup wash CLI
        uses: wasmcloud/setup-wash-action@main
        with:
          wash-version: "v2.0.5"

      # `wash build` runs the .wash/config.yaml command, which is
      # `cargo build --workspace --target wasm32-wasip2 --release` and
      # produces both http_api.wasm and task_photon.wasm.
      - name: Build components
        run: wash build

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          tags=()
          [ -n "${{ inputs.tag }}" ] && tags+=("${{ inputs.tag }}")
          tags+=("sha-${GITHUB_SHA::7}")
          [ "${GITHUB_REF}" = "refs/heads/main" ] && tags+=("latest")
          [[ "${GITHUB_REF}" == refs/tags/v* ]] && tags+=("${GITHUB_REF_NAME#v}")
          printf '%s\n' "${tags[@]}" | awk '!seen[$0]++' | paste -sd, - > tags.txt
          echo "image_tags=$(cat tags.txt)" >> "$GITHUB_OUTPUT"
          echo "Computed image tags: $(cat tags.txt)"

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Push http-api
        id: push-http-api
        shell: bash
        env:
          IMAGE_TAGS: ${{ steps.tags.outputs.image_tags }}
          IMAGE: ghcr.io/cosmonic-labs/server-side-photon/http-api
          PATH_WASM: target/wasm32-wasip2/release/http_api.wasm
        run: |
          set -euo pipefail
          IFS=',' read -ra TAGS <<< "$IMAGE_TAGS"
          digest=""
          for tag in "${TAGS[@]}"; do
            tag=$(echo "$tag" | xargs)
            ref="${IMAGE}:${tag}"
            echo "Pushing $ref"
            push_json=$(wash oci push --output json "$ref" "$PATH_WASM")
            this_digest=$(echo "$push_json" | jq -r .data.digest)
            if [ -z "$this_digest" ] || [ "$this_digest" = "null" ]; then
              echo "::error::no digest in push output: $push_json"
              exit 1
            fi
            digest="$this_digest"
          done
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Push task-photon
        id: push-task-photon
        shell: bash
        env:
          IMAGE_TAGS: ${{ steps.tags.outputs.image_tags }}
          IMAGE: ghcr.io/cosmonic-labs/server-side-photon/task-photon
          PATH_WASM: target/wasm32-wasip2/release/task_photon.wasm
        run: |
          set -euo pipefail
          IFS=',' read -ra TAGS <<< "$IMAGE_TAGS"
          digest=""
          for tag in "${TAGS[@]}"; do
            tag=$(echo "$tag" | xargs)
            ref="${IMAGE}:${tag}"
            echo "Pushing $ref"
            push_json=$(wash oci push --output json "$ref" "$PATH_WASM")
            this_digest=$(echo "$push_json" | jq -r .data.digest)
            if [ -z "$this_digest" ] || [ "$this_digest" = "null" ]; then
              echo "::error::no digest in push output: $push_json"
              exit 1
            fi
            digest="$this_digest"
          done
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      # Build provenance attestation requires the GitHub artifact attestation
      # feature, which is currently not enabled on the cosmonic-labs plan.
      # Kept in the workflow as continue-on-error so re-enabling it later is
      # just a matter of removing the flag once billing is upgraded.
      - name: Attest http-api
        continue-on-error: true
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/cosmonic-labs/server-side-photon/http-api
          subject-digest: ${{ steps.push-http-api.outputs.digest }}
          push-to-registry: true

      - name: Attest task-photon
        continue-on-error: true
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/cosmonic-labs/server-side-photon/task-photon
          subject-digest: ${{ steps.push-task-photon.outputs.digest }}
          push-to-registry: true
